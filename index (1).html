<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票投資記帳軟體</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { margin-bottom: 30px; }
    .header h1 { font-size: 28px; margin-bottom: 5px; }
    .header p { color: #666; font-size: 14px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
    .tab-btn { 
      padding: 12px 16px; 
      background: transparent; 
      border: none; 
      font-size: 14px; 
      cursor: pointer; 
      color: #666; 
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active { color: #1976d2; border-bottom-color: #1976d2; }
    .section { display: none; }
    .section.active { display: block; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
    input, select { 
      width: 100%; 
      padding: 10px 12px; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      font-size: 14px; 
      font-family: inherit;
      transition: border-color 0.3s;
    }
    input:focus, select:focus { 
      outline: none; 
      border-color: #1976d2; 
      box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
    }
    button { 
      padding: 10px 16px; 
      background: #f0f0f0; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 14px; 
      color: #333; 
      font-weight: 500;
      transition: all 0.3s;
    }
    button:hover { background: #e8e8e8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.btn-primary { 
      background: #1976d2; 
      color: white; 
      border-color: #1976d2;
    }
    button.btn-primary:hover:not(:disabled) { background: #1565c0; }
    button.btn-secondary { background: #f5f5f5; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .form-row.two-col { grid-template-columns: 2fr 1fr; }
    @media (max-width: 768px) {
      .form-row, .form-row.three { grid-template-columns: 1fr; }
    }
    .table-wrapper { overflow-x: auto; margin: 16px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 500; border: 1px solid #e0e0e0; }
    td { padding: 12px; border: 1px solid #e0e0e0; }
    tr:hover { background: #fafafa; }
    .btn-delete { 
      padding: 6px 12px; 
      font-size: 12px; 
      background: #ffebee; 
      color: #d32f2f; 
      border-color: #ffcdd2;
    }
    .btn-delete:hover { background: #ffcdd2; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #fafafa; border-radius: 4px; padding: 16px; border: 1px solid #e0e0e0; }
    .card-label { font-size: 12px; color: #999; margin-bottom: 8px; font-weight: 500; }
    .card-value { font-size: 24px; font-weight: 500; color: #333; }
    .card-value.positive { color: #388e3c; }
    .card-value.negative { color: #d32f2f; }
    .empty-state { text-align: center; padding: 32px; color: #999; }
    .status-info { 
      padding: 12px; 
      background: #e3f2fd; 
      color: #1976d2; 
      border-radius: 4px; 
      margin-bottom: 16px; 
      font-size: 13px;
      border: 1px solid #bbdefb;
    }
    .status-success { background: #e8f5e9; color: #388e3c; border-color: #c8e6c9; }
    .status-warning { background: #fff3e0; color: #f57c00; border-color: #ffe0b2; }
    .status-error { background: #ffebee; color: #d32f2f; border-color: #ffcdd2; }
    .price-display { 
      background: white; 
      padding: 10px 12px; 
      border-radius: 4px; 
      border: 1px solid #ddd; 
      font-weight: 500; 
      min-height: 38px; 
      display: flex; 
      align-items: center; 
    }
    .spinner { 
      display: inline-block; 
      width: 14px; 
      height: 14px; 
      border: 2px solid #ddd; 
      border-top-color: #1976d2; 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
      margin-right: 8px; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note { 
      font-size: 12px; 
      color: #666; 
      margin-top: 8px; 
      padding: 8px; 
      background: #f5f5f5; 
      border-radius: 4px;
      border-left: 3px solid #1976d2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 股票投資記帳軟體</h1>
      <p>追蹤你的投資組合，計算損益，管理股息</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add')">新增交易</button>
      <button class="tab-btn" onclick="switchTab('portfolio')">投資組合</button>
      <button class="tab-btn" onclick="switchTab('dividend')">股息記錄</button>
      <button class="tab-btn" onclick="switchTab('analysis')">分析</button>
    </div>

    <!-- 新增交易 -->
    <div id="add" class="section active">
      <h3 style="margin-bottom: 20px; font-size: 18px; font-weight: 500;">新增股票交易</h3>
      
      <div class="form-row two-col">
        <div class="form-group">
          <label>股票代碼</label>
          <input type="text" id="stockCode" placeholder="例: 2330" maxlength="10">
        </div>
        <div style="display: flex; gap: 8px; margin-top: 24px;">
          <button class="btn-secondary btn-small" onclick="searchStock()" style="flex: 1;">查詢股價</button>
        </div>
      </div>

      <div id="searchStatus" style="display: none;"></div>
      
      <div class="form-row">
        <div class="form-group">
          <label>股票名稱</label>
          <input type="text" id="stockName" placeholder="例: 台積電">
        </div>
        <div class="form-group">
          <label>目前股價 (元)</label>
          <div class="price-display" id="priceDisplay">-</div>
        </div>
      </div>

      <div class="form-row three">
        <div class="form-group">
          <label>交易日期</label>
          <input type="date" id="buyDate">
        </div>
        <div class="form-group">
          <label>買入價位 (元)</label>
          <input type="number" id="buyPrice" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>購買股數</label>
          <input type="number" id="quantity" placeholder="0" step="1">
        </div>
      </div>

      <button class="btn-primary" onclick="addTransaction()" style="width: 100%;">新增交易</button>

      <div class="note">💡 提示：輸入股票代碼後按「查詢股價」會自動取得最新股價</div>
    </div>

    <!-- 投資組合 -->
    <div id="portfolio" class="section">
      <h3 style="margin-bottom: 20px; font-size: 18px; font-weight: 500;">我的投資組合</h3>
      <div class="summary-cards">
        <div class="card">
          <div class="card-label">總投資額</div>
          <div class="card-value" id="totalInvested">$0</div>
        </div>
        <div class="card">
          <div class="card-label">現值</div>
          <div class="card-value" id="totalValue">$0</div>
        </div>
        <div class="card">
          <div class="card-label">未實現損益</div>
          <div class="card-value" id="totalGainLoss">$0</div>
        </div>
        <div class="card">
          <div class="card-label">報酬率</div>
          <div class="card-value" id="returnRate">0.00%</div>
        </div>
      </div>

      <div style="margin-bottom: 16px;">
        <button class="btn-secondary" onclick="refreshAllPrices()" id="refreshBtn">🔄 更新所有股價</button>
      </div>

      <div class="table-wrapper">
        <table id="portfolioTable">
          <thead>
            <tr>
              <th>代碼</th>
              <th>名稱</th>
              <th>買入日期</th>
              <th>買入價位</th>
              <th>股數</th>
              <th>投資額</th>
              <th>目前股價</th>
              <th>現值</th>
              <th>損益金額</th>
              <th>損益%</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="emptyPortfolio" class="empty-state">還沒有任何交易記錄</div>
    </div>

    <!-- 股息記錄 -->
    <div id="dividend" class="section">
      <h3 style="margin-bottom: 20px; font-size: 18px; font-weight: 500;">股息配發記錄</h3>
      <div class="form-row">
        <div class="form-group">
          <label>選擇股票</label>
          <select id="dividendStockSelect">
            <option value="">-- 選擇股票 --</option>
          </select>
        </div>
        <div class="form-group">
          <label>配息日期</label>
          <input type="date" id="dividendDate">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>配息總額 (元)</label>
          <input type="number" id="dividendAmount" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>股利年度</label>
          <input type="text" id="dividendYear" placeholder="例: 2024">
        </div>
      </div>
      <button class="btn-primary" onclick="addDividend()" style="width: 100%;">記錄配息</button>
      
      <h3 style="margin-top: 32px; margin-bottom: 20px; font-size: 18px; font-weight: 500;">配息明細</h3>
      <div class="summary-cards">
        <div class="card">
          <div class="card-label">總股息收入</div>
          <div class="card-value" id="totalDividends">$0</div>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="dividendTable">
          <thead>
            <tr>
              <th>代碼</th>
              <th>股票名稱</th>
              <th>配息日期</th>
              <th>配息金額</th>
              <th>年度</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="emptyDividend" class="empty-state">還沒有任何股息記錄</div>
    </div>

    <!-- 分析 -->
    <div id="analysis" class="section">
      <h3 style="margin-bottom: 20px; font-size: 18px; font-weight: 500;">投資分析</h3>
      <div style="background: #fafafa; border-radius: 4px; padding: 16px; margin-bottom: 24px; border: 1px solid #e0e0e0;">
        <h4 style="margin-bottom: 16px; font-size: 14px;">投資組合配置</h4>
        <canvas id="allocationChart" height="300"></canvas>
      </div>
      <div style="background: #fafafa; border-radius: 4px; padding: 16px; border: 1px solid #e0e0e0;">
        <h4 style="margin-bottom: 16px; font-size: 14px;">損益對比</h4>
        <canvas id="performanceChart" height="300"></canvas>
      </div>
    </div>
  </div>

  <script>
    let transactions = JSON.parse(localStorage.getItem('stockTransactions')) || [];
    let dividends = JSON.parse(localStorage.getItem('stockDividends')) || [];
    let currentPrice = null;
    let allocationChart = null;
    let performanceChart = null;

    async function fetchStockPrice(code) {
      try {
        // 使用台灣證交所官方 API - 這是最準確的即時股價來源
        const response = await fetch(`https://www.twse.com.tw/rsvs_q?response=json&date=&selectDate=&stockInfoItem=&pageNumber=&lang=zh_tw&showChart=&chartType=&stockInfo=&keyword=${code}`, {
          headers: {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
        });
        
        if (!response.ok) {
          throw new Error('API 連接失敗');
        }
        
        const data = await response.json();
        
        if (data.msgArray && data.msgArray.length > 0) {
          const stock = data.msgArray[0];
          const price = parseFloat(stock.z);
          
          if (price && price > 0) {
            return {
              success: true,
              price: price,
              name: stock.n || code
            };
          }
        }
        
        return { success: false, error: '查不到該股票代碼或股價無效' };
      } catch (error) {
        console.error('查詢失敗:', error);
        return { success: false, error: '無法連接台灣證交所，請稍後重試或手動輸入股價' };
      }
    }

    async function searchStock() {
      const code = document.getElementById('stockCode').value.trim().toUpperCase();
      if (!code) {
        alert('請輸入股票代碼');
        return;
      }

      const statusDiv = document.getElementById('searchStatus');
      statusDiv.innerHTML = '<div class="status-info"><span class="spinner"></span> 查詢中...</div>';
      statusDiv.style.display = 'block';

      const searchBtn = event.target;
      searchBtn.disabled = true;

      const result = await fetchStockPrice(code);

      if (result.success) {
        document.getElementById('stockName').value = result.name;
        document.getElementById('priceDisplay').textContent = `$${result.price.toFixed(2)}`;
        currentPrice = result.price;
        statusDiv.innerHTML = `<div class="status-success">✓ 找到 ${result.name} (${code})，現價 $${result.price.toFixed(2)}</div>`;
      } else {
        statusDiv.innerHTML = '<div class="status-error">✗ 查詢失敗，請檢查股票代碼或稍後重試</div>';
        currentPrice = null;
      }

      searchBtn.disabled = false;
    }

    function addTransaction() {
      const code = document.getElementById('stockCode').value.trim().toUpperCase();
      const name = document.getElementById('stockName').value.trim();
      const date = document.getElementById('buyDate').value;
      const price = parseFloat(document.getElementById('buyPrice').value);
      const qty = parseInt(document.getElementById('quantity').value);
      const priceText = document.getElementById('priceDisplay').textContent.replace('$', '').trim();
      const current = currentPrice || parseFloat(priceText);

      if (!code || !name || !date || !price || !qty || !current || current === 0 || isNaN(current)) {
        alert('請填入所有欄位（包括目前股價）');
        return;
      }

      transactions.push({ code, name, date, price, qty, current, id: Date.now() });
      localStorage.setItem('stockTransactions', JSON.stringify(transactions));
      
      document.getElementById('stockCode').value = '';
      document.getElementById('stockName').value = '';
      document.getElementById('buyDate').value = '';
      document.getElementById('buyPrice').value = '';
      document.getElementById('quantity').value = '';
      document.getElementById('priceDisplay').textContent = '-';
      document.getElementById('searchStatus').style.display = 'none';
      currentPrice = null;
      
      updateDividendSelect();
      updatePortfolio();
      alert('交易已新增！');
    }

    async function refreshAllPrices() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '更新中...';

      let successCount = 0;
      for (let i = 0; i < transactions.length; i++) {
        const t = transactions[i];
        
        const result = await fetchStockPrice(t.code);
        if (result.success) {
          t.current = result.price;
          successCount++;
        }
        
        await new Promise(resolve => setTimeout(resolve, 500));
      }

      localStorage.setItem('stockTransactions', JSON.stringify(transactions));
      updatePortfolio();
      btn.disabled = false;
      btn.textContent = '🔄 更新所有股價';
      alert(`已成功更新 ${successCount}/${transactions.length} 檔股票的股價`);
    }

    function deleteTransaction(id) {
      if (confirm('確定要刪除此筆交易嗎？')) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('stockTransactions', JSON.stringify(transactions));
        updatePortfolio();
      }
    }

    function updatePortfolio() {
      const tbody = document.querySelector('#portfolioTable tbody');
      tbody.innerHTML = '';

      if (transactions.length === 0) {
        document.getElementById('emptyPortfolio').style.display = 'block';
        updateSummary();
        return;
      }

      document.getElementById('emptyPortfolio').style.display = 'none';
      
      let totalInvested = 0;
      let totalValue = 0;

      transactions.forEach(t => {
        const invested = t.price * t.qty;
        const value = t.current * t.qty;
        const gain = value - invested;
        const gainPercent = (gain / invested) * 100;

        totalInvested += invested;
        totalValue += value;

        const row = document.createElement('tr');
        const gainColor = gain >= 0 ? '#388e3c' : '#d32f2f';
        row.innerHTML = `
          <td>${t.code}</td>
          <td>${t.name}</td>
          <td>${new Date(t.date).toLocaleDateString('zh-TW')}</td>
          <td>$${t.price.toFixed(2)}</td>
          <td>${t.qty}</td>
          <td>$${Math.round(invested).toLocaleString()}</td>
          <td>$${t.current.toFixed(2)}</td>
          <td>$${Math.round(value).toLocaleString()}</td>
          <td style="color: ${gainColor};">$${Math.round(gain).toLocaleString()}</td>
          <td style="color: ${gainColor};">${gainPercent.toFixed(2)}%</td>
          <td><button class="btn-delete" onclick="deleteTransaction(${t.id})">刪除</button></td>
        `;
        tbody.appendChild(row);
      });

      const totalGain = totalValue - totalInvested;
      const totalGainPercent = totalInvested > 0 ? (totalGain / totalInvested) * 100 : 0;
      const gainColor = totalGain >= 0 ? '#388e3c' : '#d32f2f';

      document.getElementById('totalInvested').textContent = '$' + Math.round(totalInvested).toLocaleString();
      document.getElementById('totalValue').textContent = '$' + Math.round(totalValue).toLocaleString();
      document.getElementById('totalGainLoss').innerHTML = `<span style="color: ${gainColor};">$${Math.round(totalGain).toLocaleString()}</span>`;
      document.getElementById('returnRate').innerHTML = `<span style="color: ${gainColor};">${totalGainPercent.toFixed(2)}%</span>`;
    }

    function updateDividendSelect() {
      const select = document.getElementById('dividendStockSelect');
      select.innerHTML = '<option value="">-- 選擇股票 --</option>';
      
      transactions.forEach(t => {
        const option = document.createElement('option');
        option.value = t.id;
        option.textContent = `${t.code} - ${t.name}`;
        select.appendChild(option);
      });
    }

    function addDividend() {
      const stockId = document.getElementById('dividendStockSelect').value;
      const date = document.getElementById('dividendDate').value;
      const amount = parseFloat(document.getElementById('dividendAmount').value);
      const year = document.getElementById('dividendYear').value.trim();

      if (!stockId || !date || !amount || !year) {
        alert('請填入所有欄位');
        return;
      }

      const transaction = transactions.find(t => t.id == stockId);
      
      dividends.push({
        code: transaction.code,
        name: transaction.name,
        date,
        amount,
        year,
        id: Date.now()
      });

      localStorage.setItem('stockDividends', JSON.stringify(dividends));
      
      document.getElementById('dividendStockSelect').value = '';
      document.getElementById('dividendDate').value = '';
      document.getElementById('dividendAmount').value = '';
      document.getElementById('dividendYear').value = '';
      
      updateDividends();
      alert('股息已記錄！');
    }

    function deleteDividend(id) {
      if (confirm('確定要刪除此筆股息記錄嗎？')) {
        dividends = dividends.filter(d => d.id !== id);
        localStorage.setItem('stockDividends', JSON.stringify(dividends));
        updateDividends();
      }
    }

    function updateDividends() {
      const tbody = document.querySelector('#dividendTable tbody');
      tbody.innerHTML = '';

      if (dividends.length === 0) {
        document.getElementById('emptyDividend').style.display = 'block';
        document.getElementById('totalDividends').textContent = '$0';
        return;
      }

      document.getElementById('emptyDividend').style.display = 'none';
      
      let totalDiv = 0;

      dividends.forEach(d => {
        totalDiv += d.amount;
        
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${d.code}</td>
          <td>${d.name}</td>
          <td>${new Date(d.date).toLocaleDateString('zh-TW')}</td>
          <td>$${d.amount.toFixed(2)}</td>
          <td>${d.year}</td>
          <td><button class="btn-delete" onclick="deleteDividend(${d.id})">刪除</button></td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('totalDividends').textContent = '$' + Math.round(totalDiv).toLocaleString();
    }

    function updateSummary() {
      if (transactions.length === 0) {
        document.getElementById('totalInvested').textContent = '$0';
        document.getElementById('totalValue').textContent = '$0';
        document.getElementById('totalGainLoss').textContent = '$0';
        document.getElementById('returnRate').textContent = '0.00%';
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
      
      if (tab === 'analysis') {
        setTimeout(updateCharts, 300);
      }
    }

    function updateCharts() {
      const labels = transactions.map(t => `${t.code}`);
      const values = transactions.map(t => t.current * t.qty);
      
      const allocationCtx = document.getElementById('allocationChart').getContext('2d');
      
      if (allocationChart) allocationChart.destroy();
      
      allocationChart = new Chart(allocationCtx, {
        type: 'doughnut',
        data: {
          labels: labels.length > 0 ? labels : ['無資料'],
          datasets: [{
            data: values.length > 0 ? values : [1],
            backgroundColor: [
              '#1976d2', '#388e3c', '#f57c00', '#d32f2f', '#7b1fa2', '#0097a7'
            ],
            borderColor: 'white',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { font: { size: 12 } } }
          }
        }
      });

      const gainLossData = transactions.map(t => {
        return (t.current - t.price) * t.qty;
      });

      const performanceCtx = document.getElementById('performanceChart').getContext('2d');
      
      if (performanceChart) performanceChart.destroy();
      
      performanceChart = new Chart(performanceCtx, {
        type: 'bar',
        data: {
          labels: labels.length > 0 ? labels : ['無資料'],
          datasets: [{
            label: '損益金額 (元)',
            data: gainLossData.length > 0 ? gainLossData : [0],
            backgroundColor: gainLossData.map(v => v >= 0 ? '#388e3c' : '#d32f2f'),
            borderColor: gainLossData.map(v => v >= 0 ? '#2e7d32' : '#c62828'),
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: {
            legend: { labels: { font: { size: 12 } } }
          },
          scales: {
            x: { ticks: { color: '#666' }, grid: { color: '#f0f0f0' } },
            y: { ticks: { color: '#666' }, grid: { color: '#f0f0f0' } }
          }
        }
      });
    }

    // 初始化
    updatePortfolio();
    updateDividends();
    updateDividendSelect();

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('buyDate').value = today;
  </script>
</body>
</html>
